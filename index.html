<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div id="container">
        <h3>You have 3 rounds!</h3>
        <button id="button-start">Start!</button>
        <div class="content">
            <button class="btn">Rock</button>
            <button class="btn">Paper</button>
            <button class="btn">Scissors</button>
        </div>
        <div></div>
        <div>Your Choice: <span class="human-choice"></span></div>
        <div>Computer Choice: <strong class="computer-choice"></strong></div>
        <div class="score">
            <div>Computer Score: <span class="computer-score">0</span></div>
            <div>Your Score: <span class="human-score">0</span></div>
        </div>
        <div class="display">Result!</div>
        <h2 class="game-over">Final Result!</h2>
    </div>
</body>
</html>
